<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#d9e6ff"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <!-- Shoulders / blouse -->
    <path d="M 30 200 Q 40 150 100 150 Q 160 150 170 200 Z" fill="#1a6efc"/>
    <!-- Neck -->
    <rect x="88" y="120" width="24" height="30" rx="4" fill="#f0c89a"/>
    <!-- Face -->
    <ellipse cx="100" cy="95" rx="38" ry="44" fill="#f5d2a8"/>
    <!-- Hair back -->
    <path d="M 58 80 Q 56 50 100 42 Q 144 50 142 90 L 138 110 Q 130 60 100 56 Q 70 60 62 110 Z" fill="#4a2a1a"/>
    <!-- Hair front bangs -->
    <path d="M 70 70 Q 80 50 100 50 Q 120 50 130 70 Q 125 72 115 70 Q 100 68 85 72 Q 75 72 70 70 Z" fill="#4a2a1a"/>
    <!-- Hair side strands -->
    <path d="M 60 90 Q 58 110 64 130 L 70 125 Q 65 105 65 88 Z" fill="#4a2a1a"/>
    <path d="M 140 90 Q 142 110 136 130 L 130 125 Q 135 105 135 88 Z" fill="#4a2a1a"/>
    <!-- Eyes -->
    <ellipse cx="86" cy="98" rx="3" ry="4" fill="#2a1810"/>
    <ellipse cx="114" cy="98" rx="3" ry="4" fill="#2a1810"/>
    <!-- Eyebrows -->
    <path d="M 80 90 Q 86 87 92 90" stroke="#4a2a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 108 90 Q 114 87 120 90" stroke="#4a2a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <ellipse cx="78" cy="110" rx="6" ry="4" fill="#f5b5a0" opacity="0.6"/>
    <ellipse cx="122" cy="110" rx="6" ry="4" fill="#f5b5a0" opacity="0.6"/>
    <!-- Nose -->
    <path d="M 100 102 Q 98 112 100 116 Q 102 118 104 116" stroke="#d4a888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M 90 122 Q 100 128 110 122" stroke="#a04040" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Earrings -->
    <circle cx="62" cy="105" r="2.5" fill="#ffbe57"/>
    <circle cx="138" cy="105" r="2.5" fill="#ffbe57"/>
    <!-- Collar accent -->
    <path d="M 92 155 L 100 165 L 108 155" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
