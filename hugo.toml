baseURL = "https://meilleur-logiciel-sirh.com/"
title = "Meilleur Logiciel SIRH"
theme = "sirh"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = false
enableEmoji = false
removePathAccents = true
titleCaseStyle = "none"

[params]
  description = "Comparatif indépendant des logiciels SIRH du marché : paie, GTA, talents, formation. Guides, retours d'expérience et tendances RH."
  default_og_image = "/images/og-default.png"
  logo = "/images/logo.svg"
  founding_year = "2026"
  expertise = ["Logiciels SIRH", "Gestion des temps", "Paie et administration RH", "Gestion des talents", "Formation et compétences"]
  author_name = "Mathilde Lefranc"
  author_url = "https://meilleur-logiciel-sirh.com/authors/mathilde-lefranc/"
  author_job_title = "Consultante SIRH & transformation RH"
  og_locale_alternate = "en_US"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["html", "rss"]
  section = ["html", "rss"]
  taxonomy = ["html", "rss"]

[languages]
  [languages.fr]
    locale = "fr-FR"
    label = "Français"
    weight = 1
    contentDir = "content"
    title = "Meilleur Logiciel SIRH"
    [languages.fr.params]
      description = "Comparatif indépendant des logiciels SIRH du marché : paie, GTA, talents, formation. Guides, retours d'expérience et tendances RH."

  [languages.en]
    locale = "en-US"
    label = "English"
    weight = 2
    contentDir = "content/en"
    title = "Best HRIS Software"
    [languages.en.params]
      description = "Independent comparison of HRIS software: payroll, time tracking, talent management, training. Guides, real-world insights and HR trends."

